<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TechBot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 5 Cahaya Lingkaran Kecil -->
    <div class="orb-container">
        <div class="small-orb orb-1"></div>
        <div class="small-orb orb-2"></div>
        <div class="small-orb orb-3"></div>
        <div class="small-orb orb-4"></div>
        <div class="small-orb orb-5"></div>
        <div class="small-orb orb-6"></div>
        <div class="small-orb orb-7"></div>
        <div class="small-orb orb-8"></div>
        <div class="small-orb orb-9"></div>
        <div class="small-orb orb-10"></div>
        <div class="small-orb orb-11"></div>
        <div class="small-orb orb-12"></div>
        <div class="small-orb orb-13"></div>
        <div class="small-orb orb-14"></div>
        <div class="small-orb orb-15"></div>
    </div>

    <div class="login-container">
        <img src="SEJARAH.jpg" alt="Logo Sejarah" class="login-logo">
        <div class="animated-title">
            <span style="--i:1">C</span>
            <span style="--i:2">H</span>
            <span style="--i:3">A</span>
            <span style="--i:4">T</span>
            <span style="--i:5">&nbsp;</span>
            <span style="--i:6">B</span>
            <span style="--i:7">O</span>
            <span style="--i:8">T</span>
            <span style="--i:9">&nbsp;</span>
            <span style="--i:10">S</span>
            <span style="--i:11">E</span>
            <span style="--i:12">J</span>
            <span style="--i:13">A</span>
            <span style="--i:14">R</span>
            <span style="--i:15">A</span>
            <span style="--i:16">H</span>
            <span style="--i:17">W</span>
            <span style="--i:18">A</span>
            <span style="--i:19">N</span>
        </div>
        <h2>System Login</h2>
        <form id="login-form">
            <input type="text" id="username" placeholder="Masukkan nama panggilan..." required autocomplete="off" autofocus />
            <button type="submit" id="login-btn">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </form>
    </div>

    <script>
        // Jika user sudah pernah login, langsung arahkan ke area chat
        if(localStorage.getItem('username')) {
            window.location.href = 'index.html';
        }

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            if(username) {
                // Simpan nama panggilan di memori browser
                localStorage.setItem('username', username);
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
