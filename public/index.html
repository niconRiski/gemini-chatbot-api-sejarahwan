<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechBot - AI Assistant</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- Layar Sapaan (Greeting Overlay) -->
    <div id="greeting-overlay" class="greeting-overlay">
        <img src="https://cdn-icons-png.flaticon.com/512/3145/3145765.png" alt="Buku Sejarah">
        <h1 id="greeting-text">Loading...</h1>
    </div>

    <!-- 5 Cahaya Lingkaran Kecil -->
    <div class="orb-container">
        <div class="small-orb orb-1"></div>
        <div class="small-orb orb-2"></div>
        <div class="small-orb orb-3"></div>
        <div class="small-orb orb-4"></div>
        <div class="small-orb orb-5"></div>
        <div class="small-orb orb-6"></div>
        <div class="small-orb orb-7"></div>
        <div class="small-orb orb-8"></div>
        <div class="small-orb orb-9"></div>
        <div class="small-orb orb-10"></div>
        <div class="small-orb orb-11"></div>
        <div class="small-orb orb-12"></div>
        <div class="small-orb orb-13"></div>
        <div class="small-orb orb-14"></div>
        <div class="small-orb orb-15"></div>
    </div>

    <div class="app-container">
        <header class="chat-header">
            <div class="avatar"></div>
            <div class="header-info" style="flex: 1;">
                <h2>Sejarawan Nusantara</h2>
                <p>Hadir untuk bercerita</p>
            </div>
            <!-- Tombol Logout -->
            <button id="logout-btn" style="background: none; border: none; color: #ef4444; font-size: 13px; font-weight: bold; cursor: pointer;">Logout</button>
        </header>
        
        <div id="chat-box" class="chat-box">
            <!-- Pesan percakapan akan muncul di sini -->
        </div>

        <div class="suggestion-chips">
            <button class="chip">Pakaian adat</button>
            <button class="chip">Makanan</button>
            <button class="chip">Rumah adat</button>
            <button class="chip">Tokoh Pahlawan</button>
            <button class="chip">Kerajaan Nusantara</button>
            <button class="chip">Candi & Artefak</button>
        </div>

        <form id="chat-form" class="chat-form">
            <input type="text" id="user-input" placeholder="Ketik pesan..." autocomplete="off" required />
            <button type="submit" id="send-btn">
                <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
